<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de area restringida</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header>
        <h1>Control de area restringida</h1>
    </header>

    <main>
        <form>
            <fieldset>
                <legend>Autenticación de Seguridad</legend>
                <label for="empleado_id">ID de Empleado:</label>
                <input type="text" id="empleado_id" name="empleado_id" pattern="[A-Z]{2}-\d{4}" placeholder="Ej: AB-1234" required>
                <small>Formato: Dos letras, guion y 4 números.</small>

                <label for="pin">PIN de Seguridad:</label>
                <input type="password" id="pin" name="pin" maxlength="6" required>

                <label for="zona">Zona de Acceso:</label>
                <select id="zona" name="zona">
                    <option value="servidores">Cuarto de Servidores</option>
                    <option value="laboratorio">Laboratorio Químico</option>
                    <option value="archivo">Archivo Confidencial</option>
                </select>
        
                <button type="submit">Solicitar Acceso</button>
            </fieldset>
        </form>
    </main>

    <footer>
        <p>Sistema de Control de Accesos</p>
    </footer>

</body>

</html>
