<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Supermercado</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header>
        <h1>Inventario de Supermercado</h1>
    </header>

    <main>
        <form>
            <fieldset>
                <legend>Entrada de Mercancía</legend>
                <label for="barcode">Código de Barras:</label>
                <input type="number" id="barcode" name="barcode" required>

                <label for="cantidad">Cantidad Recibida:</label>
                <input type="number" id="cantidad" name="cantidad" min="1" value="1">

                <label for="vencimiento">Fecha de Expiración:</label>
                <input type="date" id="vencimiento" name="vencimiento" required>

                <label for="proveedor">Proveedor:</label>
                <input type="text" id="proveedor" name="proveedor" list="proveedores_list">
                <datalist id="proveedores_list">
                    <option value="Distribuidora Sol">
                    <option value="Alimentos S.A.">
                </datalist>

                <button type="submit">Actualizar Existencias</button>
            </fieldset>
        </form>
    </main>

    <footer>
        <p>Actualizaciones de Inventario GESA</p>
    </footer>

</body>

</html>
