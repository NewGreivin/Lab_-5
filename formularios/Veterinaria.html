<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Registro de Pacientes - Veterinaria</title>
</head>
<body>
    <header>
        <h1>Registro de Pacientes - Veterinaria</h1>
    </header>

    <main>
        <form action="#" method="post">
            <fieldset>
                <legend>Datos del Propietario</legend>

                <label for="nombre_propietario">Nombre:</label>
                <input type="text" id="nombre_propietario" name="nombre_propietario" required>

                <label for="apellido_propietario">Apellido:</label>
                <input type="text" id="apellido_propietario" name="apellido_propietario" required>

                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono" pattern="\d{4}-\d{4}" placeholder="####-####" required>

                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email">
            </fieldset>

            <fieldset>
                <legend>Datos de la Mascota</legend>

                <label for="nombre_mascota">Nombre de la Mascota:</label>
                <input type="text" id="nombre_mascota" name="nombre_mascota" required>

                <label for="tipo_animal">Tipo de Animal:</label>
                <select id="tipo_animal" name="tipo_animal" required>
                    <option value="">Seleccione</option>
                    <option value="perro">Perro</option>
                    <option value="gato">Gato</option>
                    <option value="ave">Ave</option>
                    <option value="otros">Otros</option>
                </select>

                <label for="raza">Raza:</label>
                <input type="text" id="raza" name="raza">

                <label for="edad">Edad:</label>
                <input type="number" id="edad" name="edad" min="0" max="50">
            </fieldset>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Veterinaria Salud Animal</p>
    </footer>
</body>
</html>
