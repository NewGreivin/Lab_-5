<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago en Línea</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Pago Seguro</h1>
</header>

<main>
    <form>
        <fieldset>
            <legend>Información de Pago</legend>

            <label for="nombreTarjeta">Nombre en la Tarjeta</label>
            <input type="text" id="nombreTarjeta" required>

            <label for="numeroTarjeta">Número de Tarjeta</label>
            <input type="text" id="numeroTarjeta" required>

            <label for="expiracion">Fecha de Expiración</label>
            <input type="month" id="expiracion" required>

            <label for="cvv">CVV</label>
            <input type="password" id="cvv" required>
        </fieldset>

        <button type="submit">Realizar Pago</button>
    </form>
</main>

<footer>
    <p>Plataforma de Comercio Electrónico</p>
</footer>

</body>
</html>
