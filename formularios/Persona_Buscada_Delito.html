<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Persona Buscada por Delito</title>
</head>
<body>
    <header>
        <h1>Persona Buscada por Delito</h1>
    </header>

    <main>
        <form action="#" method="post">

            <fieldset>
                <legend>Datos Personales</legend>

                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>

                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" required>

                <label for="edad">Edad:</label>
                <input type="number" id="edad" name="edad" min="0" max="120" required>

                <label>Sexo:</label>
                <input type="radio" id="sexo_m" name="sexo" value="masculino" required>
                <label for="sexo_m">Masculino</label>
                <input type="radio" id="sexo_f" name="sexo" value="femenino" required>
                <label for="sexo_f">Femenino</label>
            </fieldset>

            <fieldset>
                <legend>Descripción Física</legend>

                <label for="altura">Altura (m):</label>
                <input type="number" step="0.01" id="altura" name="altura" required>

                <label for="color_cabello">Color de Cabello:</label>
                <input type="text" id="color_cabello" name="color_cabello" required>

                <label for="senales">Señas Particulares:</label>
                <textarea id="senales" name="senales" rows="3"></textarea>
            </fieldset>
        </form>
    </main>

    <footer>
        <p>2026 Policía Nacional</p>
    </footer>
</body>
</html>
