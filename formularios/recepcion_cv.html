<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción de CV</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header>
        <h1>Recepción de CV</h1>
    </header>

    <main>
        <form>
            <fieldset>
                <legend>Postulación Laboral</legend>
                <label for="candidato">Nombre Completo:</label>
                <input type="text" id="candidato" name="candidato" required>

                <label for="telefono">Teléfono de contacto:</label>
                <input type="tel" id="telefono" name="telefono" placeholder="8888-8888" pattern="[0-9]{4}-[0-9]{4}" required>

                <label for="perfil">Enlace a LinkedIn/Portafolio:</label>
                <input type="url" id="perfil" name="perfil" placeholder="https://linkedin.com/in/tu-usuario">

                <label for="cv">Adjuntar Currículum (PDF):</label>
                <input type="file" id="cv" name="cv" accept=".pdf" required>

                <label>Disponibilidad:</label>
                <div>
                    <input type="radio" id="inmediata" name="dispo" value="inmediata"> <label for="inmediata">Inmediata</label>
                    <input type="radio" id="preaviso" name="dispo" value="preaviso"> <label for="preaviso">A convenir</label>
                </div>

                <button type="submit">Enviar Postulación</button>
            </fieldset>
        </form>
    </main>

    <footer>
        <p>Empleos ministerio de hacienda_recpCV</p>
    </footer>

</body>

</html>
